services:
  - type: web
    name: garden-manager-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: garden-manager-db
          property: connectionString
      - key: DEBUG
        value: false